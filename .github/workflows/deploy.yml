name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload website to IONOS
    runs-on: ubuntu-latest

    steps:
      - name: Get files
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload by SFTP
        run: |
          lftp <<EOF
          open -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:22
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 2
          mirror -R --verbose --exclude .git/ --exclude .github/ ./ "${{ secrets.FTP_REMOTE_DIR }}"
          bye
          EOF