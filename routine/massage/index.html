<!DOCTYPE html>
<html lang="fr">
 <link rel="icon" href="svg.ico" type="image/x-icon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900&display=swap" rel="stylesheet">
    <title>Massages</title>
     <div class="texte">Les massages</div><BR><BR><BR><BR><BR><style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 40vh;
            margin: 0;
            padding: 10px;
        }

        .texte {
            font-family: "Kanit", sans-serif;
            font-weight: 300;
            font-style: normal;
            position: absolute;
            padding-top: 80px;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            text-align: center;
        }

        .checkbox-wrapper {
            display: flex;
            font-family: "Roboto", sans-serif;
            font-weight: 500;
            align-items: center;
            padding: 20px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
            border-radius: 10px;
            color: white;
            position: relative;
            transition: background-color 0.3s ease;
        }

        .checkbox-wrapper.green {
            background-color: green;
        }

        label {
            flex: 1;
            text-align: left;
        }

        .arrow {
            font-size: 20px;
            cursor: pointer;
            margin-left: 10px;
            margin-right: 20px;
            transition: transform 0.3s ease;
        }

        .arrow.down {
            transform: rotate(180deg);
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            margin-left: auto;
        }

        .hidden-text {
            font-family: "Roboto", sans-serif;
            font-weight: 400;
            display: none;
            padding: 10px;
            color: black;
            background-color: white;
            border-radius: 5px;
            margin-top: 0px;
        }

        .visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="checkbox-wrapper green">
        <img src="21.png" width="26px">&nbsp;&nbsp;&nbsp;<label for="checkbox1">Massage du dos</label>
        <span class="arrow" id="arrow1" onclick="toggleText(1)">▼</span>

    </div>
    <div class="hidden-text" id="text1">   <video width="355" height="360" controls>
        <source src="lol.mp4" type="video/MP4">
        Votre navigateur ne supporte pas la lecture de vidéos HTML5.
    </video></div>

    <div class="checkbox-wrapper green">
        <img src="22.png" width="30px">&nbsp;&nbsp;&nbsp;<label for="checkbox2">Massage des cuisses</label>
        <span class="arrow" id="arrow2" onclick="toggleText(2)">▼</span>
   
    </div>
    <div class="hidden-text" id="text2">   <video width="355" height="360" controls>
        <source src="lol.mp4" type="video/MP4">
        Votre navigateur ne supporte pas la lecture de vidéos HTML5.
    </video></div>

    <div class="checkbox-wrapper green">
        <img src="23.png" width="30px">&nbsp;&nbsp;&nbsp;<label for="checkbox3">Massage des pieds</label>
        <span class="arrow" id="arrow3" onclick="toggleText(3)">▼</span>
 
    </div>
   <div class="hidden-text" id="text3">   <video width="355" height="360" controls>
        <source src="lol.mp4" type="video/MP4">
        Votre navigateur ne supporte pas la lecture de vidéos HTML5.
    </video></div>

    <div class="checkbox-wrapper green">
        <img src="24.png" width="30px">&nbsp;&nbsp;&nbsp;<label for="checkbox4">Massage de la nuque</label>
        <span class="arrow" id="arrow4" onclick="toggleText(4)">▼</span>

    </div>
 <div class="hidden-text" id="text4">   <video width="355" height="360" controls>
        <source src="lol.mp4" type="video/MP4">
        Votre navigateur ne supporte pas la lecture de vidéos HTML5.
    </video></div>

    <script>
        function toggleText(option) {
            const textElement = document.getElementById(`text${option}`);
            const arrowElement = document.getElementById(`arrow${option}`);
            if (textElement.classList.contains('visible')) {
                textElement.classList.remove('visible');
                arrowElement.classList.remove('down');
            } else {
                textElement.classList.add('visible');
                arrowElement.classList.add('down');
            }
        }

        function changeBoxColor(option) {
            const checkbox = document.getElementById(`checkbox${option}`);
            const wrapper = checkbox.closest('.checkbox-wrapper');
            if (checkbox.checked) {
                wrapper.style.backgroundColor = '#094216'; // Couleur cochée
            } else {
                wrapper.style.backgroundColor = 'green'; // Couleur non cochée
            }
            localStorage.setItem(`checkbox${option}`, checkbox.checked);
        }

        function loadCheckboxes() {
            for (let i = 1; i <= 4; i++) {
                const checkbox = document.getElementById(`checkbox${i}`);
                const checked = localStorage.getItem(`checkbox${i}`) === 'true';
                checkbox.checked = checked;
                changeBoxColor(i);
            }
        }

        window.onload = function () {
            loadCheckboxes();
        };
    </script>
</body>

</html>
